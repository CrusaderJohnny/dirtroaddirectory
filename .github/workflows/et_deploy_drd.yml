# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - drd

on:
  push:
    branches:
      - et_deploy
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '~22'

      - name: npm install, build, and test
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          
      - name: Prepare deployment package
        run: |
          rm -rf deploy_package
          mkdir deploy_package
          cp -r .next deploy_package/
          cp -r public deploy_package/ # Your static assets
          cp package.json deploy_package/
          cp package-lock.json deploy_package/ # Or yarn.lock/pnpm-lock.yaml
          [ -f next.config.js ] && cp next.config.js deploy_package/
          [ -f middleware.ts ] && cp middleware.ts deploy_package/
          [ -f middleware.js ] && cp middleware.js deploy_package/
        shell: bash

      - name: Zip artifact for deployment
        # Zip the contents of the 'deploy_package' directory, not the whole repo
        run: zip -r release.zip deploy_package/
        # The 'path' for upload-artifact should point to the generated zip
      
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_4DB3B11F72E844178584FD03FFD5C500 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_E967F71E1F0E4D459903EBC09778ED2D }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_CD43F6D3B018429EB7005E2EDBAD4099 }}

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'drd'
          slot-name: 'Production'
          package: .
