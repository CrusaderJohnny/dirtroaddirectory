# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - drd

on:
  push:
    branches:
      - et_deploy
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: npm install, build, and test
        run: |
          npm install
          npm run build --if-present
          npm run test --if-present
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}

      - name: Prepare deployment package
        run: |
          # Ensure a clean slate for the deploy_package directory
          rm -rf deploy_package
          mkdir deploy_package

          # Copy only the *essential* Next.js build output and configuration files.
          # Crucially, this does NOT copy the node_modules folder from the runner.
          cp -r .next deploy_package/
          cp -r public deploy_package/
          cp package.json deploy_package/
          cp package-lock.json deploy_package/ # Or yarn.lock/pnpm-lock.yaml

          # Optional: Copy next.config.js if you have one and it's needed at runtime
          [ -f next.config.js ] && cp next.config.js deploy_package/

          # Optional: Copy middleware.ts/js if you use Next.js Middleware
          [ -f middleware.ts ] && cp middleware.ts deploy_package/
          [ -f middleware.js ] && cp middleware.js deploy_package/
          # If your middleware is in a subfolder (e.g., src/middleware.ts), adjust path

          # Optional: Copy any other root-level files required by your deployed app
          # For example, if you have a custom server.js
          # [ -f server.js ] && cp server.js deploy_package/

          echo "Contents of deploy_package for zipping:"
          ls -la deploy_package/
          # Verify that node_modules is NOT listed here!
        shell: bash

      - name: Zip artifact for deployment
        run: zip release.zip ./* -r

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Unzip artifact for deployment
        run: unzip release.zip
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_7068464FBDA44ACAA623B174226F656E }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_923583357541489AA82BEDA6F98FD484 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_CA9425D608E24B7F8F81F3B48807B373 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'drd'
          slot-name: 'Production'
          package: .
          
